# Copy to config.toml and edit.

# Where the SQLite DB lives.
db_path = "./data/music-lib.db"

# HTTP bind address.
bind = "127.0.0.1:7700"

# Optional. If set, all /api/* routes require `Authorization: Bearer <token>`.
# Required in practice for any non-loopback bind. Generate one with:
#   openssl rand -hex 32
# auth_token = "paste-a-long-random-string-here"

# One or more libraries. Names must be unique and are user-visible. Paths are
# scanned recursively. The order here controls the default sort in clients.
[[library]]
name = "main"
path = "/path/to/your/music"

# [[library]]
# name = "podcasts"
# path = "/path/to/your/podcasts"
